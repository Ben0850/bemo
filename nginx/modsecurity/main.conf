# ===== ModSecurity Main Configuration =====
# Based on OWASP ModSecurity Core Rule Set (CRS)

SecRuleEngine On
SecRequestBodyAccess On
SecRequestBodyLimit 26214400
SecRequestBodyNoFilesLimit 131072

# Response body (optional, for data leak prevention)
SecResponseBodyAccess Off

# Temp/data directories
SecTmpDir /tmp/
SecDataDir /tmp/

# Audit logging
SecAuditEngine RelevantOnly
SecAuditLogRelevantStatus "^(?:5|4(?!04))"
SecAuditLogParts ABIJDEFHZ
SecAuditLogType Serial
SecAuditLog /var/log/modsecurity/audit.log

# Debug log (disabled in production)
SecDebugLogLevel 0

# Default action
SecDefaultAction "phase:1,deny,log,status:403"

# ===== Custom Rules for Bemo-Verwaltung =====

# Allow JSON payloads (important for our API)
SecRule REQUEST_HEADERS:Content-Type "application/json" \
    "id:1001,phase:1,t:none,t:lowercase,pass,nolog,ctl:requestBodyProcessor=JSON"

# Allow base64 image uploads for scan feature (up to 25MB)
SecRule REQUEST_URI "@beginsWith /api/scan" \
    "id:1002,phase:1,pass,nolog,ctl:requestBodyLimit=26214400"

# Allow PDF generation (larger response)
SecRule REQUEST_URI "@rx ^/api/invoices/[0-9]+/pdf$" \
    "id:1003,phase:1,pass,nolog,ctl:ruleRemoveById=959100"

# ===== Include OWASP CRS =====
Include /etc/modsecurity.d/owasp-crs/crs-setup.conf
Include /etc/modsecurity.d/owasp-crs/rules/*.conf

# ===== CRS Exclusions for our app =====
# Allow German characters in parameters (umlauts)
SecRuleRemoveById 942100

# Allow inline JSON data
SecRuleRemoveById 921110

# Prevent false positives on notes/description fields
SecRuleUpdateTargetById 942200 "!ARGS:notes"
SecRuleUpdateTargetById 942200 "!ARGS:description"
SecRuleUpdateTargetById 942200 "!ARGS:special_agreements"
SecRuleUpdateTargetById 942260 "!ARGS:notes"
SecRuleUpdateTargetById 942260 "!ARGS:description"

# Allow password field without SQL injection check (it's hashed/checked server-side)
SecRuleUpdateTargetById 942100 "!ARGS:password"
